services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-deep_research}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-deep_research}
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    image: deep-research-agent:compose
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DEEP_RESEARCH_MODEL_PROVIDER: ${DEEP_RESEARCH_MODEL_PROVIDER:-openai}
      DEEP_RESEARCH_MODEL_NAME: ${DEEP_RESEARCH_MODEL_NAME:-gpt-4.1-mini}
      DEEP_RESEARCH_OPENAI_API_KEY: ${DEEP_RESEARCH_OPENAI_API_KEY:-}
      DEEP_RESEARCH_OPENAI_BASE_URL: ${DEEP_RESEARCH_OPENAI_BASE_URL:-https://api.openai.com/v1}
      DEEP_RESEARCH_OLLAMA_BASE_URL: ${DEEP_RESEARCH_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      DEEP_RESEARCH_PERSISTENCE_BACKEND: ${DEEP_RESEARCH_PERSISTENCE_BACKEND:-postgres}
      DEEP_RESEARCH_POSTGRES_DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-deep_research}
      DEEP_RESEARCH_SQLITE_DB_URL: ${DEEP_RESEARCH_SQLITE_DB_URL:-sqlite+aiosqlite:///./.local/deep_research.sqlite3}
      DEEP_RESEARCH_DEFAULT_SEARCH_PROVIDER: ${DEEP_RESEARCH_DEFAULT_SEARCH_PROVIDER:-none}
      DEEP_RESEARCH_TAVILY_API_KEY: ${DEEP_RESEARCH_TAVILY_API_KEY:-}
      DEEP_RESEARCH_SERPER_API_KEY: ${DEEP_RESEARCH_SERPER_API_KEY:-}
      DEEP_RESEARCH_TOTAL_TOKEN_BUDGET: ${DEEP_RESEARCH_TOTAL_TOKEN_BUDGET:-120000}
      DEEP_RESEARCH_PER_SOURCE_TOKEN_BUDGET: ${DEEP_RESEARCH_PER_SOURCE_TOKEN_BUDGET:-4000}
      DEEP_RESEARCH_MAX_CONTENT_CHARS_PER_SOURCE: ${DEEP_RESEARCH_MAX_CONTENT_CHARS_PER_SOURCE:-16000}
      DEEP_RESEARCH_MAX_SOURCES_PER_TASK: ${DEEP_RESEARCH_MAX_SOURCES_PER_TASK:-8}
      DEEP_RESEARCH_MAX_NOTES: ${DEEP_RESEARCH_MAX_NOTES:-200}
      DEEP_RESEARCH_MAX_ITERATIONS: ${DEEP_RESEARCH_MAX_ITERATIONS:-6}
      DEEP_RESEARCH_HTTP_USER_AGENT: ${DEEP_RESEARCH_HTTP_USER_AGENT:-deep-research-agent/0.1.0}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - agent-local-data:/app/.local

volumes:
  agent-local-data:
  postgres-data:
